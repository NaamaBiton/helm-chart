{{- if .Values.applications }}
{{- range $app := .Values.applications }}
{{- if and $app.ingress $app.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{$app.type}}-{{$app.name}}-ingress
  namespace: {{$.Values.environment}}-{{$.Values.projectName}}
  labels:
    {{- include "generic-app.labels" (dict "Chart" $.Chart "Release" $.Release "Values" $.Values "app" $app "component" "ingress") | nindent 4 }}
  annotations:
    {{- include "generic-app.ingressAnnotations" (dict "Chart" $.Chart "Release" $.Release "Values" $.Values "app" $app) | nindent 4 }}
spec:
  ingressClassName: {{$.Values.ingress.sharedClassName | default "shared-alb"}}
  rules:
    {{- if $app.ingress.hosts}}
    {{- range $host := $app.ingress.hosts}}
    - host: {{$host}}
      http:
        paths:
          - path: {{$app.ingress.path | default "/"}}
            pathType: {{$app.ingress.pathType | default "Prefix"}}
            backend:
              service:
                name: {{$app.type}}-{{$app.name}}-service
                port:
                  number: {{index $.Values.defaults $app.type "containerPort" | default 80}}
    {{- end}}
    {{- else if $app.ingress.host}}
    - host: {{$app.ingress.host}}
      http:
        paths:
          - path: {{$app.ingress.path | default "/"}}
            pathType: {{$app.ingress.pathType | default "Prefix"}}
            backend:
              service:
                name: {{$app.type}}-{{$app.name}}-service
                port:
                  number: {{index $.Values.defaults $app.type "containerPort" | default 80}}
    {{- else}}
    - http:
        paths:
          - path: {{$app.ingress.path | default "/"}}
            pathType: {{$app.ingress.pathType | default "Prefix"}}
            backend:
              service:
                name: {{$app.type}}-{{$app.name}}-service
                port:
                  number: {{index $.Values.defaults $app.type "containerPort" | default 80}}
    {{- end}}
  {{- $hosts := list }}
  {{- if $app.ingress.hosts }}
    {{- $hosts = $app.ingress.hosts }}
  {{- else if $app.ingress.host }}
    {{- $hosts = list $app.ingress.host }}
  {{- end}}
  {{- if gt (len $hosts) 0 }}
  tls:
    - hosts:
        {{- range $h := $hosts}}
        - {{$h}}
        {{- end}}
      secretName: dummy-secret
  {{- end}}
---
{{- end }}
{{- end }}
{{- end }}

---
name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Install kubeconform
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run yamllint
        run: yamllint .

      - name: Lint all Helm charts
        shell: bash
        run: |
          set -euo pipefail
          charts=$(git ls-files '*Chart.yaml' | xargs -n1 dirname | sort -u)
          if [ -z "$charts" ]; then
            echo "No Helm charts found"; exit 0
          fi
          for chart in $charts; do
            echo "::group::helm lint $chart"
            helm lint "$chart"
            echo "::endgroup::"
          done

      - name: Validate rendered manifests with kubeconform
        shell: bash
        run: |
          set -euo pipefail
          charts=$(git ls-files '*Chart.yaml' | xargs -n1 dirname | sort -u)
          for chart in $charts; do
            echo "::group::kubeconform $chart"
            helm template "$chart" \
              | kubeconform -strict -ignore-missing-schemas
            echo "::endgroup::"
          done
